name: Frontends

on:
  push:
    branches:
      - main
    paths:
      - "frontends/**"
      - "config/domains/**"
      - "scripts/dev-cockpit/**"
      - "scripts/generate_brand_assets.py"
      - "scripts/requirements.txt"
      - "scripts/lib/**"
      - "scripts/*local-*.sh"
      - "scripts/run-with-domain-profile.sh"
      - "scripts/compose.sh"
      - "scripts/test-compose-config.sh"
      - "compose.yaml"
      - "compose.*.yaml"
      - ".dockerignore"
      - "config/deployment/**"
      - "infra/caddy/**"
      - "infra/images/**"
      - "infra/observability/**"
      - "brand/**"
      - "api/**"
      - "package.json"
      - ".github/workflows/frontends.yml"
  workflow_dispatch:

jobs:
  domains:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm run domains:test
      - run: npm run domains:check

  dev-cockpit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm --prefix scripts/dev-cockpit test

  brand-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt
      - run: python -m pip install -r scripts/requirements.txt
      - run: python scripts/generate_brand_assets.py --check

  local-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Check shell syntax
        run: >-
          bash -n
          scripts/lib/local-domain.sh
          scripts/setup-local-domain.sh
          scripts/start-local-proxy.sh
          scripts/stop-local-proxy.sh
          scripts/remove-local-domain.sh
          scripts/run-with-domain-profile.sh
          scripts/compose.sh
          scripts/test-compose-config.sh
          scripts/verify-backend.sh
          infra/images/backend-entrypoint.sh
      - name: Validate both Compose profiles and production guardrails
        run: npm run compose:config:test
      - name: Validate the local Caddyfile
        run: |
          source scripts/lib/local-domain.sh
          surplasse_local_load_config "$PWD"
          source config/deployment/images.env
          mkdir -p "$RUNNER_TEMP/surplasse-caddy"
          openssl req -x509 -newkey rsa:2048 -nodes -days 30 \
            -subj "/CN=${APP_BASE_DOMAIN}" \
            -keyout "$RUNNER_TEMP/surplasse-caddy/key.pem" \
            -out "$RUNNER_TEMP/surplasse-caddy/cert.pem"
          docker run --rm \
            -e APP_BASE_DOMAIN="$APP_BASE_DOMAIN" \
            -e APP_BASE_URL="$APP_BASE_URL" \
            -e ONBOARDING_URL="$ONBOARDING_URL" \
            -e DASHBOARD_URL="$DASHBOARD_URL" \
            -e BACKEND_UPSTREAM=backend:8080 \
            -e ONBOARDING_UPSTREAM=onboarding:4173 \
            -e COMMANDE_UPSTREAM=commande:8080 \
            -e DASHBOARD_UPSTREAM=dashboard:8080 \
            -e DOCS_UPSTREAM=docs:8080 \
            -e MAILPIT_UPSTREAM=mailpit:8025 \
            -e GRAFANA_UPSTREAM=grafana:3000 \
            -e LOCAL_CONTROL_UPSTREAM=host.docker.internal:4174 \
            -v "$PWD/infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro" \
            -v "$PWD/infra/caddy/tls/development.caddy:/etc/caddy/tls/profile.caddy:ro" \
            -v "$PWD/infra/caddy/routes/development.caddy:/etc/caddy/routes/profile.caddy:ro" \
            -v "$RUNNER_TEMP/surplasse-caddy/cert.pem:/etc/caddy/tls/certificate.pem:ro" \
            -v "$RUNNER_TEMP/surplasse-caddy/key.pem:/etc/caddy/tls/private-key.pem:ro" \
            "$CADDY_IMAGE" \
            caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
          docker run --rm \
            -v "$PWD/infra/caddy/Caddyfile:/srv/Caddyfile:ro" \
            "$CADDY_IMAGE" \
            caddy fmt /srv/Caddyfile \
            > "$RUNNER_TEMP/surplasse-caddy/Caddyfile.formatted"
          diff -u \
            infra/caddy/Caddyfile \
            "$RUNNER_TEMP/surplasse-caddy/Caddyfile.formatted"
      - name: Test the credentialed CORS boundary
        run: npm run local:cors:test

  shared:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontends/shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontends/shared/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm test

  commande:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontends/commande
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            frontends/commande/package-lock.json
            frontends/shared/package-lock.json
      # shared is consumed as source (ADR-0014), so its development
      # dependencies must be installed for frontend type checking.
      - run: npm ci --prefix ../shared
      - run: npm ci
      - run: npm run lint
      - run: npm test
      # The build includes TypeScript checking through tsc --noEmit.
      - run: npm run build

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontends/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            frontends/dashboard/package-lock.json
            frontends/shared/package-lock.json
      # shared is consumed as source (ADR-0014), so its development
      # dependencies must be installed for frontend type checking.
      - run: npm ci --prefix ../shared
      - run: npm ci
      - run: npm run lint
      - run: npm test
      # The build includes TypeScript checking through tsc --noEmit.
      - run: npm run build
