name: API

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "openapitools.json"
      - "scripts/api/**"
      - ".github/workflows/api.yml"
  workflow_dispatch:

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - run: npm ci
      - name: Lint Spectral
        run: npm run api:lint
      - name: Contrôle de compatibilité (oasdiff)
        # Dérogation explicite : un commit préfixé "api!:" assume une rupture.
        run: |
          if [[ "$(git log -1 --pretty=%s)" == 'api!:'* ]]; then
            echo "Commit api!: rupture assumée, contrôle oasdiff ignoré."
          else
            OASDIFF_BASE_REF=HEAD^ bash scripts/api/oasdiff.sh
          fi
      - name: Fraîcheur de la génération
        run: |
          npm run api:generate
          git diff --exit-code -- \
            backend/contract \
            backend/application/src/main/resources/META-INF/openapi.yaml \
            frontends/shared/src/api/generated
