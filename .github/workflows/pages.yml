name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run domains:check
      # docs:build invoque le wrapper retype.js via node directement :
      # npm 10.9.x ne crée pas le lien node_modules/.bin/retype à
      # l'installation (collision de noms de bin avec les paquets
      # plateforme retypeapp-*), donc la commande nue `retype` échouerait.
      - run: npm run docs:build
      - name: Assemble le site
        run: |
          set -e
          mkdir -p site/brand site/docs
          # Landing et onboarding à la racine ; chemins d'assets réécrits pour la racine
          for f in frontends/onboarding/index.html frontends/onboarding/creer.html; do
            sed 's|\.\./\.\./brand/|brand/|g' "$f" > "site/$(basename "$f")"
          done
          cp frontends/onboarding/runtime-config.js site/runtime-config.js
          # Assets de marque (polices, tokens, styles, composants, QR)
          cp -R brand/. site/brand/
          # Documentation Retype sous /docs
          cp -R docs-site/. site/docs/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
