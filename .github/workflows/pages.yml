name: Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "37 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  quality:
    if: github.event_name != 'schedule'
    name: UI quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            frontends/shared/package-lock.json
            frontends/commande/package-lock.json
            frontends/dashboard/package-lock.json
            frontends/design-system2/package-lock.json
            frontends/onboarding2/package-lock.json
            frontends/commande2/package-lock.json
            frontends/dashboard2/package-lock.json
      - name: Install frontend dependencies
        run: |
          npm ci --prefix frontends/shared
          npm ci --prefix frontends/commande
          npm ci --prefix frontends/dashboard
          npm ci --prefix frontends/design-system2
          npm ci --prefix frontends/onboarding2
          npm ci --prefix frontends/commande2
          npm ci --prefix frontends/dashboard2
      - name: Validate domains and static demo
        run: |
          npm run domains:test
          npm run domains:check
          npm --prefix scripts/dev-cockpit test
      - name: Validate shared frontend package
        run: |
          npm --prefix frontends/shared run check
          npm --prefix frontends/shared test
      - name: Validate Commande
        run: |
          npm --prefix frontends/commande run lint
          npm --prefix frontends/commande test
          npm --prefix frontends/commande run build
      - name: Validate Dashboard
        run: |
          npm --prefix frontends/dashboard run lint
          npm --prefix frontends/dashboard test
          npm --prefix frontends/dashboard run build
      - name: Validate experimental frontends
        run: npm run frontend2:check
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt
      - name: Validate brand assets
        run: |
          python -m pip install -r scripts/requirements.txt
          python scripts/generate_brand_assets.py --check

  local-tests:
    name: Local Compose smoke and Allure report
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      tests_outcome: ${{ steps.tests.outcome }}
    env:
      CI: "true"
      SURPLASSE_E2E_TARGET: development
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install the E2E package
        run: npm ci --prefix e2e

      - name: Resolve the development profile
        id: target
        run: |
          target_id="$(node e2e/scripts/run.mjs id development)"
          base_domain="$(node --input-type=module -e '
            import { loadDomainConfig } from "./config/domains/load-domain-config.mjs";
            process.stdout.write(loadDomainConfig("development").APP_BASE_DOMAIN);
          ')"
          echo "id=$target_id" >> "$GITHUB_OUTPUT"
          echo "base_domain=$base_domain" >> "$GITHUB_OUTPUT"

      - name: Restore the development history
        uses: actions/cache/restore@v4
        with:
          path: |
            .surplasse/e2e/${{ steps.target.outputs.id }}/current.json
            .surplasse/e2e/${{ steps.target.outputs.id }}/releases/*/history.jsonl
          key: allure-history-${{ steps.target.outputs.id }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            allure-history-${{ steps.target.outputs.id }}-

      - name: Prepare development DNS and TLS
        env:
          BASE_DOMAIN: ${{ steps.target.outputs.base_domain }}
        run: |
          set -euo pipefail
          hosts="$BASE_DOMAIN api.$BASE_DOMAIN dashboard.$BASE_DOMAIN www.$BASE_DOMAIN app.$BASE_DOMAIN"
          printf '127.0.0.1 %s\n' "$hosts" | sudo tee -a /etc/hosts >/dev/null
          mkdir -p .certs
          openssl req -x509 -newkey rsa:2048 -nodes -days 2 \
            -keyout ".certs/${BASE_DOMAIN}-key.pem" \
            -out ".certs/${BASE_DOMAIN}.pem" \
            -subj "/CN=${BASE_DOMAIN}" \
            -addext "subjectAltName=DNS:${BASE_DOMAIN},DNS:*.${BASE_DOMAIN}"
          chmod 0600 ".certs/${BASE_DOMAIN}-key.pem"
          echo "LOCAL_TLS_CA_FILE=$GITHUB_WORKSPACE/.certs/${BASE_DOMAIN}.pem" >> "$GITHUB_ENV"

      - name: Install Chromium and Linux dependencies
        run: npm --prefix e2e exec -- playwright install --with-deps chromium

      - name: Start the local Compose cluster
        id: cluster
        continue-on-error: true
        run: npm run local:up

      - name: Show cluster startup diagnostics
        if: steps.cluster.outcome == 'failure'
        continue-on-error: true
        run: |
          bash scripts/compose.sh development ps
          bash scripts/compose.sh development logs --no-color --tail 200

      - name: Propagate the cluster startup failure
        if: steps.cluster.outcome == 'failure'
        run: exit 1

      - name: Run the development smoke tests
        id: tests
        continue-on-error: true
        run: npm run e2e:test -- development

      - name: Export the public single-file report
        env:
          REPORT_ROOT: ${{ runner.temp }}/pages-local-tests
        run: >-
          node e2e/scripts/run.mjs export development
          "$REPORT_ROOT/local-tests/index.html"

      - name: Save the updated development history
        uses: actions/cache/save@v4
        with:
          path: |
            .surplasse/e2e/${{ steps.target.outputs.id }}/current.json
            .surplasse/e2e/${{ steps.target.outputs.id }}/releases/*/history.jsonl
          key: allure-history-${{ steps.target.outputs.id }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload the report for the Pages build
        uses: actions/upload-artifact@v4
        with:
          name: pages-local-tests-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/pages-local-tests
          if-no-files-found: error
          retention-days: 1

      - name: Upload the replayable report and diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ steps.target.outputs.id }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .surplasse/e2e/${{ steps.target.outputs.id }}/current.json
            .surplasse/e2e/${{ steps.target.outputs.id }}/releases
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 30

      - name: Show cluster diagnostics after a smoke failure
        if: steps.tests.outcome == 'failure'
        continue-on-error: true
        run: |
          bash scripts/compose.sh development ps
          bash scripts/compose.sh development logs --no-color --tail 200

      - name: Stop the local Compose cluster
        if: always()
        continue-on-error: true
        run: bash scripts/compose.sh development down --volumes

  build:
    needs:
      - quality
      - local-tests
    if: >-
      always() &&
      needs.local-tests.result == 'success' &&
      (needs.quality.result == 'success' || needs.quality.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs-nimbus/package-lock.json
            frontends/shared/package-lock.json
            frontends/design-system2/package-lock.json
            frontends/onboarding2/package-lock.json
            frontends/commande2/package-lock.json
            frontends/dashboard2/package-lock.json
      - run: npm ci
      - name: Install Nimbus dependencies
        run: npm ci --prefix docs-nimbus
      - name: Install experimental frontend dependencies
        run: npm run frontend2:install
      - run: npm run domains:check
      # docs:build invoque le wrapper retype.js via node directement :
      # npm 10.9.x ne crée pas le lien node_modules/.bin/retype à
      # l'installation (collision de noms de bin avec les paquets
      # plateforme retypeapp-*), donc la commande nue `retype` échouerait.
      - name: Build documentation
        run: |
          set -euo pipefail
          if ! npm run docs:build; then
            echo "::warning::Retype a échoué une première fois, nouvelle tentative."
            npm run docs:build
          fi
          repository_name="${GITHUB_REPOSITORY#*/}"
          export NIMBUS_SITE_ORIGIN="https://${GITHUB_REPOSITORY_OWNER}.github.io"
          export NIMBUS_BASE_PATH="/${repository_name}/_experiments/nimbus-docs"
          npm --prefix docs-nimbus run check
      - name: Build the static experimental demos
        run: |
          set -euo pipefail
          repository_name="${GITHUB_REPOSITORY#*/}"
          demo_base="/${repository_name}/_experiments/untitled"
          VITE_UI2_PAGES_DEMO=true \
            npm run build --prefix frontends/onboarding2 -- --mode development --base "${demo_base}/onboarding/"
          VITE_UI2_PAGES_DEMO=true \
            VITE_UI2_PAGES_DEMO_SLUG=le-cormoran \
            npm run build --prefix frontends/commande2 -- --mode development --base "${demo_base}/commande/"
          VITE_UI2_PAGES_DEMO=true \
            npm run build --prefix frontends/dashboard2 -- --mode development --base "${demo_base}/dashboard/"
          npm run frontend2:pages:check
      - name: Assemble le site
        run: |
          set -euo pipefail
          mkdir -p site/brand site/docs
          # Landing et onboarding à la racine ; chemins d'assets réécrits pour la racine
          for f in frontends/onboarding/index.html frontends/onboarding/creer.html frontends/onboarding/connect.html; do
            sed 's|\.\./\.\./brand/|brand/|g' "$f" > "site/$(basename "$f")"
          done
          cp frontends/onboarding/connect.js site/connect.js
          cp frontends/onboarding/index.css site/brand/onboarding.css
          cp frontends/onboarding/index.js site/brand/onboarding.js
          node config/domains/generate-onboarding-config.mjs \
            --profile production \
            --output site/runtime-config.js
          # Assets de marque (polices, tokens, styles, composants, QR)
          cp -R brand/. site/brand/
          rm -f site/brand/qr/qr-demo-development.png
          # Documentation Retype sous /docs
          cp -R docs-site/. site/docs/
          # Aperçu Nimbus généré depuis les mêmes Markdown
          nimbus_root="site/_experiments/nimbus-docs"
          mkdir -p "${nimbus_root}"
          cp -R docs-nimbus/dist/. "${nimbus_root}/"
          # Preuves visuelles UI2, isolées des routes produit et sans Backend Pages
          experiment_root="site/_experiments/untitled"
          mkdir -p \
            "${experiment_root}/onboarding" \
            "${experiment_root}/commande" \
            "${experiment_root}/dashboard"
          cp -R frontends/onboarding2/dist/. "${experiment_root}/onboarding/"
          cp -R frontends/commande2/dist/. "${experiment_root}/commande/"
          cp -R frontends/dashboard2/dist/. "${experiment_root}/dashboard/"
          for demo in onboarding commande dashboard; do
            sed -i 's|<head>|<head>\n    <meta name="robots" content="noindex,nofollow">|' \
              "${experiment_root}/${demo}/index.html"
          done
          mkdir -p \
            "${experiment_root}/onboarding/creer" \
            "${experiment_root}/commande/panier" \
            "${experiment_root}/dashboard/auth/login" \
            "${experiment_root}/dashboard/service"
          cp "${experiment_root}/onboarding/index.html" "${experiment_root}/onboarding/creer/index.html"
          cp "${experiment_root}/commande/index.html" "${experiment_root}/commande/panier/index.html"
          cp "${experiment_root}/dashboard/index.html" "${experiment_root}/dashboard/auth/login/index.html"
          cp "${experiment_root}/dashboard/index.html" "${experiment_root}/dashboard/service/index.html"
          node --input-type=module <<'NODE'
          import { writeFileSync } from "node:fs";

          const destination = "site/_experiments/untitled/index.html";
          writeFileSync(destination, `<!doctype html>
          <html lang="fr">
            <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <meta name="robots" content="noindex,nofollow">
              <title>Surplasse UI2 | Démonstrations expérimentales</title>
              <style>
                :root { color-scheme: light; font-family: system-ui, sans-serif; background: #eef1f2; color: #17242a; }
                * { box-sizing: border-box; }
                body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 32px 20px; }
                main { width: min(100%, 960px); }
                .eyebrow { color: #c43f00; font-size: .75rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
                h1 { max-width: 720px; margin: 12px 0; font-size: clamp(2.2rem, 7vw, 5.5rem); line-height: .95; letter-spacing: -.055em; }
                .intro { max-width: 680px; color: #52636c; font-size: 1.05rem; line-height: 1.65; }
                .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 32px 0; }
                article { min-height: 220px; display: flex; flex-direction: column; padding: 22px; border: 1px solid #b8c2c7; border-radius: 18px; background: #fff; }
                article p { color: #52636c; line-height: 1.5; }
                article a { margin-top: auto; min-height: 44px; display: inline-flex; align-items: center; justify-content: center; border-radius: 10px; background: #fa550c; color: #17242a; font-weight: 800; text-decoration: none; }
                article a:focus-visible, footer a:focus-visible { outline: 2px solid #fff; box-shadow: 0 0 0 5px #17242a; }
                footer { display: flex; flex-wrap: wrap; gap: 16px; color: #52636c; font-size: .9rem; }
                footer a { color: #17242a; }
                @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } article { min-height: 180px; } }
              </style>
            </head>
            <body>
              <main>
                <p class="eyebrow">Expérience UI2</p>
                <h1>Trois interfaces, une autre direction.</h1>
                <p class="intro">Ces builds statiques servent uniquement à la revue visuelle de l'expérience Untitled UI. Ils ne sont ni les routes produit, ni un déploiement sur le VPS. Les parcours avec données, session ou paiement se vérifient dans le profil Compose development.</p>
                <section class="grid" aria-label="Démonstrations disponibles">
                  <article><h2>Onboarding2</h2><p>La vitrine, le récit du service et le point de départ de l'embarquement.</p><a href="./onboarding/">Ouvrir Onboarding2</a></article>
                  <article><h2>Commande2</h2><p>La carte et le panier dans le nouveau système visuel.</p><a href="./commande/">Ouvrir Commande2</a></article>
                  <article><h2>Dashboard2</h2><p>Le tableau de service avec commandes synthétiques et actions locales, sans connexion au Backend.</p><a href="./dashboard/">Ouvrir Dashboard2</a></article>
                </section>
                <footer><span>Preuve visuelle GitHub Pages, profil development, sans Backend public.</span><a href="../../docs/decisions/adr-0033-frontends-alternatifs-untitled-ui/">Lire ADR-0033</a></footer>
              </main>
            </body>
          </html>`);
          NODE
      - name: Add the latest local Allure report
        uses: actions/download-artifact@v4
        with:
          name: pages-local-tests-${{ github.run_id }}-${{ github.run_attempt }}
          path: site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  local-tests-status:
    name: Propagate the local smoke failure
    needs:
      - local-tests
      - deploy
    if: >-
      always() &&
      needs.local-tests.result == 'success' &&
      needs.deploy.result == 'success' &&
      needs.local-tests.outputs.tests_outcome == 'failure'
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
