name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  quality:
    name: UI quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            frontends/shared/package-lock.json
            frontends/commande/package-lock.json
            frontends/dashboard/package-lock.json
      - name: Install frontend dependencies
        run: |
          npm ci --prefix frontends/shared
          npm ci --prefix frontends/commande
          npm ci --prefix frontends/dashboard
      - name: Validate domains and static demo
        run: |
          npm run domains:test
          npm run domains:check
          npm --prefix scripts/dev-cockpit test
      - name: Validate shared frontend package
        run: |
          npm --prefix frontends/shared run check
          npm --prefix frontends/shared test
      - name: Validate Commande
        run: |
          npm --prefix frontends/commande run lint
          npm --prefix frontends/commande test
          npm --prefix frontends/commande run build
      - name: Validate Dashboard
        run: |
          npm --prefix frontends/dashboard run lint
          npm --prefix frontends/dashboard test
          npm --prefix frontends/dashboard run build
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt
      - name: Validate brand assets
        run: |
          python -m pip install -r scripts/requirements.txt
          python scripts/generate_brand_assets.py --check

  build:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run domains:check
      # docs:build invoque le wrapper retype.js via node directement :
      # npm 10.9.x ne crée pas le lien node_modules/.bin/retype à
      # l'installation (collision de noms de bin avec les paquets
      # plateforme retypeapp-*), donc la commande nue `retype` échouerait.
      - run: npm run docs:build
      - name: Assemble le site
        run: |
          set -e
          mkdir -p site/brand site/docs
          # Landing et onboarding à la racine ; chemins d'assets réécrits pour la racine
          for f in frontends/onboarding/index.html frontends/onboarding/creer.html frontends/onboarding/connect.html; do
            sed 's|\.\./\.\./brand/|brand/|g' "$f" > "site/$(basename "$f")"
          done
          cp frontends/onboarding/connect.js site/connect.js
          cp frontends/onboarding/runtime-config.js site/runtime-config.js
          # Assets de marque (polices, tokens, styles, composants, QR)
          cp -R brand/. site/brand/
          # Documentation Retype sous /docs
          cp -R docs-site/. site/docs/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
