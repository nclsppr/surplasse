name: Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "api/**"
      - "config/domains/**"
      - "scripts/run-with-domain-profile.sh"
      - "package.json"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      # verify enchaîne compilation, tests unitaires, tests d'intégration
      # (@QuarkusTest sur PostgreSQL 17 via Testcontainers, réponses
      # validées contre le contrat) et le contrôle de formatage Spotless.
      - run: npm run backend:verify
