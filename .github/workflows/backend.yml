name: Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "api/**"
      - "config/domains/**"
      - "config/deployment/images.env"
      - "infra/images/backend.Dockerfile"
      - "infra/images/backend-entrypoint.sh"
      - "scripts/run-with-domain-profile.sh"
      - "package.json"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      # verify enchaîne compilation, tests unitaires, tests d'intégration
      # (@QuarkusTest sur PostgreSQL 17 via Testcontainers, réponses
      # validées contre le contrat) et le contrôle de formatage Spotless.
      - run: npm run backend:verify
      - name: Build the production Backend image without demo seed resources
        run: |
          source config/deployment/images.env
          docker build \
            --file infra/images/backend.Dockerfile \
            --build-arg TEMURIN_BUILD_IMAGE="$TEMURIN_BUILD_IMAGE" \
            --build-arg TEMURIN_RUNTIME_IMAGE="$TEMURIN_RUNTIME_IMAGE" \
            --build-arg DOMAIN_PROFILE=production \
            --tag surplasse/backend:production-check \
            .
