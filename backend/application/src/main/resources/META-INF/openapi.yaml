openapi: 3.1.0

info:
  title: Surplasse API
  version: 0.1.0
  summary: The Surplasse REST API, defined contract-first.
  description: |
    Surplasse lets independent restaurants run their own direct ordering
    channel. This contract is the single source of truth of the API: the
    backend implements Java interfaces generated from it, the frontends
    consume a generated TypeScript client.

    Version 0.1 covers the public catalog, ordering, payment, restaurateur
    identity flows, the authenticated operational-order list and the
    order-intake control. Other Dashboard reads remain drafts (`x-draft`
    blocks, excluded from generation and compatibility checks) until their
    authorization is implemented end to end.

    Conventions: paths are prefixed with `/v1`, money amounts are integers
    in cents with a `Cents` suffix, timestamps are ISO 8601 UTC, and every
    error is an RFC 9457 Problem Details document.
  contact:
    name: Surplasse
    url: https://surplasse.com

servers:
  - url: /
    description: Current API origin, injected by the environment at runtime.

tags:
  - name: catalog
    description: >
      The menu of an establishment: categories, products, option groups and
      options, as published on the mini-site.
  - name: establishment
    description: >
      Authenticated operational controls of an establishment, kept separate
      from its platform-owned lifecycle.
  - name: order
    description: >
      The customer order lifecycle: anonymous table sessions, cart
      validation, payment and real-time tracking.
  - name: payment
    description: >
      The Stripe integration: payment sessions consumed by the Payment
      Element, and the signed webhook that is the single source of truth
      of a successful payment.
  - name: identity
    description: >
      Restaurateur authentication: single-use magic links, short session JWTs
      and rotating refresh tokens carried only by hardened cookies.

paths:
  /v1/establishments/{slug}/public:
    get:
      tags: [catalog]
      operationId: getEstablishmentPublic
      summary: Get the public profile of an establishment
      description: |
        Returns the public information of an establishment resolved by its
        slug (the subdomain of its mini-site). This endpoint is public: it
        backs the header of the mini-site rendered by the Commande frontend.
        `acceptingOrders` lets that frontend keep the menu readable while
        disabling order actions during an operational pause.
        Unknown slugs, as well as establishments that are not publicly
        visible, yield a 404 without distinction.
      parameters:
        - $ref: "#/components/parameters/EstablishmentSlug"
      responses:
        "200":
          description: The public profile of the establishment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstablishmentPublic"
              example:
                id: 7c9e6679-7425-40de-944b-e07fc1f90ae7
                name: Le Cormoran
                slug: le-cormoran
                address: 12 quai des Belges, 13001 Marseille
                acceptingOrders: true
        "400":
          description: The slug is syntactically invalid.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/validation-error
                title: Validation error
                status: 400
                detail: "Path parameter 'slug' does not match the expected pattern."
                instance: /v1/establishments/Le%20Cormoran/public
        "404":
          description: No establishment matches this slug.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/resource-not-found
                title: Resource not found
                status: 404
                detail: No establishment matches slug 'le-cormoran'.
                instance: /v1/establishments/le-cormoran/public

  /v1/establishments/{slug}/menu:
    get:
      tags: [catalog]
      operationId: getPublishedMenu
      summary: Get the published menu of an establishment
      description: |
        Returns the published menu of an establishment resolved by its slug,
        as a complete read model: categories, products, option groups and
        options, in display order (array order is the display order, no
        position field is exposed). Products and options marked unavailable
        are included with `available: false` so the frontend can render them
        greyed out. If the establishment has no published menu, the response
        is a 404.
      parameters:
        - $ref: "#/components/parameters/EstablishmentSlug"
      responses:
        "200":
          description: The published menu, in display order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicMenu"
              example:
                id: 9b2f5c1a-6d3e-4b7f-8a2c-1e9d8c7b6a5f
                name: Carte principale
                currency: EUR
                categories:
                  - id: c1a2b3c4-d5e6-47f8-89ab-cdef01234501
                    name: Entrées
                    products:
                      - id: d0e1f2a3-b4c5-46d7-88e9-f0a1b2c3d401
                        name: Panisses croustillantes
                        description: Frites de pois chiches, aïoli maison.
                        priceCents: 650
                        available: true
                        optionGroups: []
                  - id: c1a2b3c4-d5e6-47f8-89ab-cdef01234502
                    name: Plats
                    products:
                      - id: d0e1f2a3-b4c5-46d7-88e9-f0a1b2c3d405
                        name: Burger du Vieux-Port
                        description: Pain artisanal, bœuf de Provence, tomme de brebis.
                        priceCents: 1600
                        available: true
                        optionGroups:
                          - id: e1f2a3b4-c5d6-47e8-89f0-a1b2c3d4e502
                            name: Cuisson
                            minChoices: 1
                            maxChoices: 1
                            options:
                              - id: f0a1b2c3-d4e5-46f7-88a9-b0c1d2e3f404
                                name: Saignant
                                extraCostCents: 0
                                available: true
                              - id: f0a1b2c3-d4e5-46f7-88a9-b0c1d2e3f405
                                name: À point
                                extraCostCents: 0
                                available: true
                              - id: f0a1b2c3-d4e5-46f7-88a9-b0c1d2e3f406
                                name: Bien cuit
                                extraCostCents: 0
                                available: true
        "400":
          description: The slug is syntactically invalid.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/validation-error
                title: Validation error
                status: 400
                detail: "Path parameter 'slug' does not match the expected pattern."
                instance: /v1/establishments/Le%20Cormoran/menu
        "404":
          description: No establishment matches this slug, or it has no published menu.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/resource-not-found
                title: Resource not found
                status: 404
                detail: No establishment matches slug 'le-cormoran'.
                instance: /v1/establishments/le-cormoran/menu

  /v1/establishments/{establishmentId}/order-intake:
    get:
      tags: [establishment]
      operationId: getOrderIntake
      summary: Get the operational order-intake state
      description: |
        Returns whether the authenticated restaurateur currently accepts new
        table sessions, orders and payment sessions for this establishment.
        This operational switch does not hide the public menu and never cuts
        access to existing orders, their tracking pages or their event streams.

        The restaurateur session cookie is required. Unknown establishments
        and establishments outside the caller's scope yield the same 404.
      security:
        - restaurateurSession: []
      parameters:
        - $ref: "#/components/parameters/EstablishmentId"
      responses:
        "200":
          description: The current operational order-intake state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderIntakeState"
              example:
                establishmentId: 7c9e6679-7425-40de-944b-e07fc1f90ae7
                status: open
                acceptingOrders: true
                updatedAt: "2026-07-20T10:00:00Z"
        "400":
          description: The establishment identifier is syntactically invalid.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/validation-error
                title: Validation error
                status: 400
                detail: "Path parameter 'establishmentId' must be a UUID."
                instance: /v1/establishments/not-a-uuid/order-intake
        "401":
          description: The restaurateur session is missing or expired.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/session-expired
                title: Session expired
                status: 401
                detail: The restaurateur session is expired or missing.
                instance: /v1/establishments/7c9e6679-7425-40de-944b-e07fc1f90ae7/order-intake
        "404":
          description: Unknown establishment, or establishment outside the caller's scope.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/resource-not-found
                title: Resource not found
                status: 404
                detail: The establishment does not exist or is not accessible.
                instance: /v1/establishments/7c9e6679-7425-40de-944b-e07fc1f90ae7/order-intake
    put:
      tags: [establishment]
      operationId: updateOrderIntake
      summary: Open or pause new orders
      description: |
        Idempotently opens or pauses new table sessions, orders and payment
        sessions for one establishment. Pausing is always allowed. Opening is
        allowed only while the establishment is active, has a published menu,
        exposes at least one active table and can create Stripe charges.

        Operations already in flight are not cancelled. In particular, a
        Payment Intent whose client secret was already returned can still
        succeed and must then be served or refunded. Existing orders, their
        tracking pages and their event streams remain available in both states.

        The restaurateur session cookie is required. Unknown establishments
        and establishments outside the caller's scope yield the same 404.
      security:
        - restaurateurSession: []
      parameters:
        - $ref: "#/components/parameters/EstablishmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderIntakeUpdate"
      responses:
        "200":
          description: The state after the idempotent update.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderIntakeState"
              example:
                establishmentId: 7c9e6679-7425-40de-944b-e07fc1f90ae7
                status: paused
                acceptingOrders: false
                blockedReason: paused
                updatedAt: "2026-07-20T10:05:00Z"
        "400":
          description: The identifier or payload is syntactically invalid.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/validation-error
                title: Validation error
                status: 400
                detail: "status must be one of: open, paused."
                instance: /v1/establishments/7c9e6679-7425-40de-944b-e07fc1f90ae7/order-intake
        "401":
          description: The restaurateur session is missing or expired.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/session-expired
                title: Session expired
                status: 401
                detail: The restaurateur session is expired or missing.
                instance: /v1/establishments/7c9e6679-7425-40de-944b-e07fc1f90ae7/order-intake
        "404":
          description: Unknown establishment, or establishment outside the caller's scope.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/resource-not-found
                title: Resource not found
                status: 404
                detail: The establishment does not exist or is not accessible.
                instance: /v1/establishments/7c9e6679-7425-40de-944b-e07fc1f90ae7/order-intake
        "422":
          description: The establishment is not ready to open order intake.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                establishmentNotActive:
                  summary: The establishment lifecycle is not active
                  value:
                    type: https://surplasse.com/problems/order-intake-establishment-not-active
                    title: Order intake unavailable
                    status: 422
                    detail: The establishment must be active before accepting orders.
                    instance: /v1/establishments/7c9e6679-7425-40de-944b-e07fc1f90ae7/order-intake
                configurationUnavailable:
                  summary: The menu or table configuration is incomplete
                  value:
                    type: https://surplasse.com/problems/order-intake-configuration-unavailable
                    title: Order intake unavailable
                    status: 422
                    detail: A published menu and at least one active table are required before accepting orders.
                    instance: /v1/establishments/7c9e6679-7425-40de-944b-e07fc1f90ae7/order-intake
                paymentsUnavailable:
                  summary: Stripe Connect cannot accept card charges
                  value:
                    type: https://surplasse.com/problems/order-intake-payments-unavailable
                    title: Order intake unavailable
                    status: 422
                    detail: Stripe card charges must be ready before accepting orders.
                    instance: /v1/establishments/7c9e6679-7425-40de-944b-e07fc1f90ae7/order-intake

  /v1/table-sessions:
    post:
      tags: [order]
      operationId: createTableSession
      summary: Open an anonymous table session from a scanned QR code
      description: |
        Exchanges the table code carried by a scanned QR
        (`{slug}.surplasse.com/?table={code}`) for an opaque anonymous
        session token, bound to the establishment and to that table. The
        token authorizes the ordering endpoints (`X-Table-Session` header)
        for the duration of a meal (2 hours, sliding while active). It
        carries no personal data. An unknown slug, an unknown or inactive
        table code, an establishment that is not active or an operational
        order-intake pause all yield a 404 without distinction.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TableSessionRequest"
      responses:
        "201":
          description: The anonymous session, bound to the establishment and the table.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TableSession"
              example:
                token: ts_9f2c4b7a1e6d8a3c5f0b2d4e6a8c1f3b
                establishmentId: 7c9e6679-7425-40de-944b-e07fc1f90ae7
                tableLabel: Table 4
                expiresAt: "2026-07-18T14:30:00Z"
        "400":
          description: The payload is syntactically invalid.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/validation-error
                title: Validation error
                status: 400
                detail: "tableCode must not be blank."
                instance: /v1/table-sessions
        "404":
          description: Unknown establishment or table code, or ordering closed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/resource-not-found
                title: Resource not found
                status: 404
                detail: No active table matches this code.
                instance: /v1/table-sessions

  /v1/orders:
    get:
      tags: [order]
      operationId: listOrders
      summary: List the operational orders of an establishment
      description: |
        Cursor-paginated list of the operational orders of one
        establishment for the Dashboard, sorted by creation timestamp and
        identifier, both descending. Only `paid`, `accepted`, `preparing`
        and `ready` orders are returned. Pending payment and terminal orders
        are deliberately excluded from this phase.

        The opaque cursor stays stable while new orders arrive and is never
        interpreted by the client. The restaurateur session cookie and
        establishment membership are both required: an unknown establishment
        and an establishment outside the caller's scope yield the same 404.
      security:
        - restaurateurSession: []
      parameters:
        - name: establishmentId
          in: query
          required: true
          description: Establishment whose orders are listed.
          schema:
            type: string
            format: uuid
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        - name: cursor
          in: query
          required: false
          description: Opaque cursor returned by the previous page.
          schema:
            type: string
            minLength: 1
            maxLength: 512
          example: MjAyNi0wNy0xOFQxMjozNDo1NlonMGQ5ZThjN2I
        - name: limit
          in: query
          required: false
          description: Page size, between 1 and 100.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          example: 50
      responses:
        "200":
          description: One page of orders, newest first.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPage"
              example:
                items:
                  - id: 0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b
                    displayNumber: "17"
                    status: paid
                    type: on_site
                    tableLabel: Table 4
                    lines:
                      - productId: d0e1f2a3-b4c5-46d7-88e9-f0a1b2c3d405
                        productName: Burger du Vieux-Port
                        unitPriceCents: 1600
                        quantity: 1
                        options: []
                        lineTotalCents: 1600
                    totalCents: 1600
                    currency: EUR
                    createdAt: "2026-07-18T12:34:56Z"
                nextCursor: djF8MjAyNi0wNy0xOFQxMjozNDo1NlowZDllOGM3Yg
                hasMore: true
        "400":
          description: The establishment identifier, limit or cursor is invalid.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/validation-error
                title: Validation error
                status: 400
                detail: The pagination cursor is malformed or incompatible with this request.
                instance: /v1/orders
        "401":
          description: The restaurateur session is missing or expired.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/session-expired
                title: Session expired
                status: 401
                detail: The restaurateur session is expired or missing.
                instance: /v1/orders
        "404":
          description: Unknown establishment, or establishment outside the caller's scope.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/resource-not-found
                title: Resource not found
                status: 404
                detail: No establishment matches this identifier.
                instance: /v1/orders
    post:
      tags: [order]
      operationId: createOrder
      summary: Create an order from a validated cart
      description: |
        Creates an order at status `pending_payment` from the cart validated
        by the customer. The cart itself never exists server side. The
        establishment and the table come exclusively from the anonymous
        table session (a customer can only order for the table whose QR was
        actually scanned). The server recomputes every amount from the
        catalog; amounts are never accepted from the client. The
        `Idempotency-Key` header guarantees that an unstable connection can
        never create the same order twice. Only `on_site` orders are
        accepted at this stage; `takeaway` is documented for the target and
        rejected with a business rule error until it opens. An order-intake
        pause rejects every new intention with `order-intake-paused`, while
        an exact replay still returns the order created before the pause.
      security:
        - tableSession: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreationRequest"
      responses:
        "201":
          description: The order was created, waiting for payment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
              examples:
                order:
                  $ref: "#/components/examples/OrderExample"
        "400":
          description: The payload is syntactically invalid.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/validation-error
                title: Validation error
                status: 400
                detail: "lines must contain at least one element."
                instance: /v1/orders
        "401":
          description: The table session token is missing, unknown or expired.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/table-session-expired
                title: Table session expired
                status: 401
                detail: The table session token is expired or unknown.
                instance: /v1/orders
        "404":
          description: A product or option of the cart does not belong to the published menu.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/resource-not-found
                title: Resource not found
                status: 404
                detail: Product 6f4b9c2d-8a1e-4d7b-b3f5-0e9a8c7d6b5a is not on the menu.
                instance: /v1/orders
        "409":
          description: Ordering was paused, a product became unavailable, or the idempotency key was reused with a different payload.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                orderIntakePaused:
                  summary: New orders are paused
                  value:
                    type: https://surplasse.com/problems/order-intake-paused
                    title: Order intake paused
                    status: 409
                    detail: This establishment is not accepting new orders right now.
                    instance: /v1/orders
                productUnavailable:
                  summary: A product became unavailable
                  value:
                    type: https://surplasse.com/problems/product-unavailable
                    title: Product unavailable
                    status: 409
                    detail: Product 'Soupe de poisson' is marked unavailable on this menu.
                    instance: /v1/orders
        "422":
          description: A business rule rejected the cart (invalid option choices, takeaway not open).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/business-rule-violation
                title: Business rule violation
                status: 422
                detail: "Option group 'Cuisson' requires exactly one choice."
                instance: /v1/orders

  /v1/orders/{orderId}:
    get:
      tags: [order]
      operationId: getOrder
      summary: Get an order for its tracking page
      description: |
        Returns an order for the customer tracking page. Access is
        authorized by the order tracking token (a non-guessable capability
        returned at creation, carried by the tracking page URL): the
        customer can close the browser and come back. A wrong token yields
        a 404 without distinction.
      parameters:
        - $ref: "#/components/parameters/OrderId"
        - $ref: "#/components/parameters/TrackingToken"
      responses:
        "200":
          description: The order, with its current status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
              examples:
                order:
                  $ref: "#/components/examples/OrderExample"
        "400":
          description: The tracking token is missing or malformed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/validation-error
                title: Validation error
                status: 400
                detail: "Query parameter 'trackingToken' is required."
                instance: /v1/orders/0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b
        "404":
          description: Unknown order, or tracking token mismatch.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/resource-not-found
                title: Resource not found
                status: 404
                detail: No order matches this tracking token.
                instance: /v1/orders/0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b

  /v1/orders/{orderId}/status:
    patch:
      tags: [order]
      operationId: updateOrderStatus
      summary: Advance an order through the operational workflow
      description: |
        Advances one order on behalf of an authenticated restaurateur. The
        target must be the next state allowed by the order state machine:
        `paid` to `accepted`, `accepted` to `preparing`, `preparing` to
        `ready`, then `ready` to `served` for an on-site order or `picked_up`
        for a takeaway order. Repeating the state already reached is
        idempotent and returns the current result without emitting another
        event. Refunds are deliberately excluded: they require a payment
        operation and cannot be represented by a status-only update.

        The restaurateur session cookie is required. Unknown orders and
        orders outside the caller's establishment scope yield the same 404.
      security:
        - restaurateurSession: []
      parameters:
        - $ref: "#/components/parameters/OrderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: The order status after the idempotent update.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderStatusResult"
              example:
                id: 0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b
                status: accepted
        "400":
          description: The order identifier or payload is syntactically invalid.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/validation-error
                title: Validation error
                status: 400
                detail: "status must be one of: accepted, preparing, ready, served, picked_up."
                instance: /v1/orders/0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b/status
        "401":
          description: The restaurateur session is missing or expired.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/session-expired
                title: Session expired
                status: 401
                detail: The restaurateur session is expired or missing.
                instance: /v1/orders/0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b/status
        "404":
          description: Unknown order, or order outside the caller's establishment scope.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/resource-not-found
                title: Resource not found
                status: 404
                detail: No order matches this identifier.
                instance: /v1/orders/0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b/status
        "409":
          description: The requested transition is not allowed from the current order status.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/order-not-modifiable
                title: Order not modifiable
                status: 409
                detail: Order status cannot move from paid to ready.
                instance: /v1/orders/0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b/status
        "422":
          description: The terminal status is incompatible with the order type.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/business-rule-violation
                title: Business rule violation
                status: 422
                detail: An on-site order must finish as served.
                instance: /v1/orders/0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b/status

  /v1/orders/{orderId}/events:
    get:
      x-sse: true
      tags: [order]
      operationId: streamOrderEvents
      summary: Stream the status changes of an order (SSE)
      description: |
        Server-Sent Events stream of the status changes of one order, for
        the customer tracking page. Authorized by the tracking token in the
        URL (the browser EventSource API cannot set headers). Each event
        carries a monotonic id; on reconnection the standard `Last-Event-ID`
        header replays missed events before resuming live. Marked `x-sse`:
        contractual, but excluded from client and server generation, and
        consumed with the native EventSource API.
      parameters:
        - $ref: "#/components/parameters/OrderId"
        - $ref: "#/components/parameters/TrackingToken"
      responses:
        "200":
          description: The event stream. Each `order-status` event carries the order status.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/EventStream"
              example: |
                id: 42
                event: order-status
                data: {"orderId":"0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b","status":"accepted"}
        "404":
          description: Unknown order, or tracking token mismatch.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/resource-not-found
                title: Resource not found
                status: 404
                detail: No order matches this tracking token.
                instance: /v1/orders/0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b/events

  /v1/payments:
    post:
      tags: [payment]
      operationId: createPayment
      summary: Create the payment session of an order
      description: |
        Creates (or returns, when replayed) the Stripe payment session of a
        `pending_payment` order: the backend re-checks product availability,
        recomputes the amount from the catalog, creates a direct-charge
        PaymentIntent on the establishment's connected account and returns
        its client secret and account identifier for the Payment Element. The browser
        confirmation is informative only: the signed Stripe webhook is the
        single source of truth that marks the order paid. An operational pause
        rejects new and replayed payment-session requests but never prevents a
        signed webhook from reconciling a Payment Intent already in flight.
      security:
        - tableSession: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentCreationRequest"
      responses:
        "201":
          description: The payment session, ready for the Payment Element.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSession"
              example:
                id: b3a2c1d0-e9f8-4a7b-8c6d-5e4f3a2b1c0d
                orderId: 0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b
                amountCents: 2250
                currency: EUR
                clientSecret: pi_3Nxxxxxxxxxxxx_secret_xxxxxxxxxxxxx
                connectedAccountId: acct_1Nxxxxxxxxxxxxxxxx
        "401":
          description: The table session token is missing, unknown or expired.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/table-session-expired
                title: Table session expired
                status: 401
                detail: The table session token is expired or unknown.
                instance: /v1/payments
        "404":
          description: Unknown order, or order outside this session.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/resource-not-found
                title: Resource not found
                status: 404
                detail: No order matches this identifier.
                instance: /v1/payments
        "409":
          description: Ordering was paused, the order is not payable anymore, or a product became unavailable.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                orderIntakePaused:
                  summary: New payments are paused
                  value:
                    type: https://surplasse.com/problems/order-intake-paused
                    title: Order intake paused
                    status: 409
                    detail: This establishment is not accepting new payments right now.
                    instance: /v1/payments
                orderNotModifiable:
                  summary: The order is already settled
                  value:
                    type: https://surplasse.com/problems/order-not-modifiable
                    title: Order not modifiable
                    status: 409
                    detail: Order 0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b is already paid.
                    instance: /v1/payments
        "422":
          description: The establishment has no active Stripe Connect account able to accept charges.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/business-rule-violation
                title: Business rule violation
                status: 422
                detail: This establishment is not ready to accept payments.
                instance: /v1/payments
        "503":
          description: Stripe is unreachable after retries.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/dependency-unavailable
                title: Dependency unavailable
                status: 503
                detail: Stripe did not answer after retries.
                instance: /v1/payments

  /v1/refunds:
    post:
      tags: [payment]
      operationId: createRefund
      summary: Fully refund a paid order
      description: |
        Creates or replays the full Stripe refund of one order on behalf of
        authenticated establishment staff. The direct charge is refunded on
        the connected account frozen on the payment. When Surplasse collected
        an application fee, the same operation returns it to the restaurant.
        Partial refunds are outside the MVP.

        The request is idempotent. Replaying a key returns the exact refund it
        previously received, while a new key reuses any refund still in
        progress or already succeeded. A failed or canceled attempt can be
        retried with a new key. The order moves to `refunded` only after Stripe
        reports a successful refund, synchronously or through a signed webhook.
      security:
        - restaurateurSession: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefundCreationRequest"
      responses:
        "201":
          description: The full refund attempt, newly created or safely replayed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Refund"
              example:
                id: a4b3c2d1-e0f9-4876-95a4-b3c2d1e0f987
                orderId: 0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b
                amountCents: 2250
                applicationFeeRefundedCents: 22
                currency: EUR
                reason: restaurant_refusal
                status: succeeded
        "401":
          description: The restaurateur session is missing or expired.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/session-expired
                title: Session expired
                status: 401
                detail: The restaurateur session is expired or missing.
                instance: /v1/refunds
        "404":
          description: Unknown order, order outside the caller's establishment, or no settled payment.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/resource-not-found
                title: Resource not found
                status: 404
                detail: No order matches this identifier.
                instance: /v1/refunds
        "409":
          description: The idempotency key conflicts or the order cannot be refunded from its current state.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/order-not-modifiable
                title: Order not modifiable
                status: 409
                detail: Order 0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b cannot be refunded from status served.
                instance: /v1/refunds
        "422":
          description: Stripe rejects the refund for a business reason.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/business-rule-violation
                title: Business rule violation
                status: 422
                detail: Stripe rejected the refund for this order.
                instance: /v1/refunds
        "503":
          description: Stripe is unreachable after retries.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/dependency-unavailable
                title: Dependency unavailable
                status: 503
                detail: Stripe did not answer.
                instance: /v1/refunds

  /v1/webhooks/stripe:
    post:
      x-raw-body: true
      tags: [payment]
      operationId: receiveStripeWebhook
      summary: Receive a signed Stripe snapshot payment or refund event
      description: |
        Snapshot event destination called server-to-server by Stripe for
        connected-account Payment Intents and refunds. The `Stripe-Signature`
        header is verified before any processing (invalid signatures yield
        400 with no side effect), the clock tolerance is 5 minutes, and
        processing is idempotent: an already processed event id is
        acknowledged without being replayed. `payment_intent.succeeded` is
        what moves an order to `paid`. `refund.created`, `refund.updated` and
        `refund.failed` reconcile the full refund; only a successful refund
        moves the order to `refunded`. Both transitions trigger their order
        broadcast. A Connect event is applied only when its top-level `account`
        matches the connected account frozen on the payment, and its `livemode`
        matches the environment.
        Marked `x-raw-body`: contractual, but implemented by hand because
        signature verification needs the raw request bytes, which a
        generated deserializing interface cannot provide.
      parameters:
        - $ref: "#/components/parameters/StripeSignature"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StripeEvent"
      responses:
        "200":
          description: The event is acknowledged (processed now, or already processed before).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAck"
              example:
                received: true
        "400":
          description: Missing or invalid signature, or unparseable payload.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/validation-error
                title: Validation error
                status: 400
                detail: Invalid Stripe-Signature header.
                instance: /v1/webhooks/stripe
        "503":
          description: The payment destination signing secret is not configured.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/dependency-unavailable
                title: Dependency unavailable
                status: 503
                detail: Stripe webhook secret is not configured for this event destination.
                instance: /v1/webhooks/stripe

  /v1/webhooks/stripe/accounts:
    post:
      x-raw-body: true
      tags: [payment]
      operationId: receiveStripeAccountWebhook
      summary: Receive a signed Stripe thin Accounts v2 event
      description: |
        Thin event destination called server-to-server by Stripe for Accounts
        v2 state changes. It has its own signing secret, distinct from the
        snapshot payment destination. After signature verification, the
        related `v2.core.account` is retrieved through Accounts v2 before a
        short transaction deduplicates the event and applies the current
        `card_payments` and `stripe_balance.payouts` statuses. An event from
        another Stripe mode is acknowledged without effect. Another payload
        family or an inconsistent related object is rejected.
        Marked `x-raw-body`: contractual, but implemented by hand because
        signature verification needs the raw request bytes.
      parameters:
        - $ref: "#/components/parameters/StripeSignature"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StripeThinEvent"
      responses:
        "200":
          description: The event is acknowledged (processed now, or already processed before).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAck"
              example:
                received: true
        "400":
          description: Missing or invalid signature, payload family, or related account.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/validation-error
                title: Validation error
                status: 400
                detail: Stripe event type does not match this event destination.
                instance: /v1/webhooks/stripe/accounts
        "503":
          description: Stripe Accounts v2 is unreachable or this destination secret is absent.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/dependency-unavailable
                title: Dependency unavailable
                status: 503
                detail: Stripe did not answer.
                instance: /v1/webhooks/stripe/accounts

  /v1/auth/magic-links:
    post:
      tags: [identity]
      operationId: requestMagicLink
      summary: Request a restaurateur magic link
      description: |
        Requests a single-use login link valid for 15 minutes. The response is
        deliberately identical whether the normalized email exists or not, so
        this endpoint cannot enumerate restaurateur accounts. A new request
        invalidates every unused link previously issued for that account.

        Requests are rate limited independently by target email and source IP.
        Email delivery happens after the request transaction and its failure is
        never exposed through this response.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MagicLinkRequest"
      responses:
        "202":
          description: Accepted; an email is queued only when the account exists.
        "400":
          description: The email payload is syntactically invalid.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/validation-error
                title: Validation error
                status: 400
                detail: email must be a well-formed email address.
                instance: /v1/auth/magic-links
        "429":
          description: Too many requests for this email or source IP.
          headers:
            Retry-After:
              description: Seconds before another request should be attempted.
              schema:
                type: integer
                minimum: 1
              example: 900
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/rate-limited
                title: Rate limit exceeded
                status: 429
                detail: Too many magic link requests. Try again later.
                instance: /v1/auth/magic-links

  /v1/auth/sessions:
    post:
      tags: [identity]
      operationId: createRestaurateurSession
      summary: Exchange a magic link token for session cookies
      description: |
        Atomically consumes a magic link token posted by the intermediate
        landing page, never by a bare GET. A successful exchange returns the
        current restaurateur view and sets two host-only HttpOnly cookies: a
        15-minute JWT and a rotating opaque refresh token valid for 30 days.
        Production cookies are Secure and every environment uses SameSite=Lax.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MagicLinkExchange"
      responses:
        "200":
          description: The session is created and both cookies are set.
          headers:
            Set-Cookie:
              description: >
                Two Set-Cookie headers carrying the host-only access and
                refresh cookies. They are HttpOnly, SameSite=Lax and Secure in
                production.
              schema:
                type: string
              example: surplasse_session=eyJ...; Path=/; Max-Age=900; HttpOnly; Secure; SameSite=Lax
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurateurSession"
              example:
                id: a1b2c3d4-e5f6-4789-8abc-def012345678
                email: pilote@le-cormoran.example
                fullName: Camille Martin
                establishments:
                  - id: 7c9e6679-7425-40de-944b-e07fc1f90ae7
                    name: Le Cormoran
                    slug: le-cormoran
        "400":
          description: The token payload is syntactically invalid.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/validation-error
                title: Validation error
                status: 400
                detail: token must not be blank.
                instance: /v1/auth/sessions
        "401":
          description: The magic link is unknown, expired or already consumed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/magic-link-expired
                title: Magic link expired
                status: 401
                detail: This magic link is expired, unknown or already used.
                instance: /v1/auth/sessions

  /v1/auth/sessions/refresh:
    post:
      tags: [identity]
      operationId: refreshRestaurateurSession
      summary: Rotate the current restaurateur session
      description: |
        Exchanges the host-only refresh cookie for a new access JWT and a new
        opaque refresh token. Rotation is atomic. Reuse of a token that has
        already been rotated revokes its complete token family.
      security:
        - restaurateurRefresh: []
      responses:
        "200":
          description: The refresh token is rotated and both cookies are replaced.
          headers:
            Set-Cookie:
              description: >
                Two Set-Cookie headers replacing the host-only access and
                refresh cookies.
              schema:
                type: string
              example: surplasse_session=eyJ...; Path=/; Max-Age=900; HttpOnly; Secure; SameSite=Lax
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurateurSession"
              example:
                id: a1b2c3d4-e5f6-4789-8abc-def012345678
                email: pilote@le-cormoran.example
                fullName: Camille Martin
                establishments:
                  - id: 7c9e6679-7425-40de-944b-e07fc1f90ae7
                    name: Le Cormoran
                    slug: le-cormoran
        "401":
          description: The refresh cookie is missing, expired, revoked or reused.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/session-expired
                title: Session expired
                status: 401
                detail: The restaurateur session is expired or missing.
                instance: /v1/auth/sessions/refresh

  /v1/auth/sessions/current:
    get:
      tags: [identity]
      operationId: getCurrentRestaurateurSession
      summary: Get the current restaurateur session
      description: |
        Returns the authenticated restaurateur and the establishments they can
        access. The Dashboard uses this read model to discover establishment
        identifiers instead of embedding one in its configuration.
      security:
        - restaurateurSession: []
      responses:
        "200":
          description: The current restaurateur and accessible establishments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurateurSession"
              example:
                id: a1b2c3d4-e5f6-4789-8abc-def012345678
                email: pilote@le-cormoran.example
                fullName: Camille Martin
                establishments:
                  - id: 7c9e6679-7425-40de-944b-e07fc1f90ae7
                    name: Le Cormoran
                    slug: le-cormoran
        "401":
          description: The access cookie is missing, expired or invalid.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/session-expired
                title: Session expired
                status: 401
                detail: The restaurateur session is expired or missing.
                instance: /v1/auth/sessions/current
    delete:
      tags: [identity]
      operationId: deleteCurrentRestaurateurSession
      summary: Log out the current restaurateur session
      description: |
        Revokes the refresh-token family when the refresh cookie is valid, then
        expires both cookies. The operation stays idempotent and returns 204
        when cookies are absent, invalid or already revoked.
      responses:
        "204":
          description: The session is revoked when identifiable and both cookies are expired.

  /v1/establishments/{establishmentId}/order-events:
    get:
      x-sse: true
      tags: [order]
      operationId: streamEstablishmentOrderEvents
      summary: Stream the order activity of an establishment (SSE)
      description: |
        Server-Sent Events stream of the order activity of one establishment
        for the Dashboard. Each `order-status` event notifies a new paid order
        or a later status change. The Dashboard resynchronizes its REST list
        when it receives an event, so this stream remains an accelerator and
        never the source of truth.

        The restaurateur session cookie and establishment membership are both
        required. The browser sends the cookie with `EventSource` configured
        with `withCredentials: true`. Each event carries a monotonic id; on
        reconnection the standard `Last-Event-ID` header replays missed events
        before live delivery resumes. Marked `x-sse`: contractual, but excluded
        from client and server generation, and consumed with the native
        EventSource API.
      security:
        - restaurateurSession: []
      parameters:
        - name: establishmentId
          in: path
          required: true
          description: Identifier of the establishment.
          schema:
            type: string
            format: uuid
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
      responses:
        "200":
          description: The event stream for the authorized establishment.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/EventStream"
              example: |
                id: 42
                event: order-status
                data: {"orderId":"0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b","status":"paid"}
        "401":
          description: The restaurateur session is missing or expired.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/session-expired
                title: Session expired
                status: 401
                detail: The restaurateur session is expired or missing.
                instance: /v1/establishments/7c9e6679-7425-40de-944b-e07fc1f90ae7/order-events
        "404":
          description: Unknown establishment, or establishment outside the caller's scope.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: https://surplasse.com/problems/resource-not-found
                title: Resource not found
                status: 404
                detail: The establishment does not exist or is not accessible.
                instance: /v1/establishments/7c9e6679-7425-40de-944b-e07fc1f90ae7/order-events

components:
  securitySchemes:
    tableSession:
      type: apiKey
      in: header
      name: X-Table-Session
      description: >
        Opaque anonymous table session token, delivered by
        `createTableSession` when a table QR is scanned. Bound to one
        establishment and one table, valid for the duration of a meal,
        carrying no personal data.
    restaurateurSession:
      type: apiKey
      in: cookie
      name: surplasse_session
      description: >
        Short session JWT set after the magic link exchange. The cookie is
        host-only for api.surplasse.com, HttpOnly, Secure in production,
        SameSite=Lax and scoped to Path=/. Used by Dashboard endpoints and SSE.
    restaurateurRefresh:
      type: apiKey
      in: cookie
      name: surplasse_refresh
      description: >
        Opaque rotating refresh token, hashed server side and valid for 30
        days. The host-only cookie is HttpOnly, Secure in production,
        SameSite=Lax and scoped to Path=/v1/auth/sessions.

  parameters:
    EstablishmentId:
      name: establishmentId
      in: path
      required: true
      description: Identifier of an establishment.
      schema:
        type: string
        format: uuid
      example: 7c9e6679-7425-40de-944b-e07fc1f90ae7

    EstablishmentSlug:
      name: slug
      in: path
      required: true
      description: >
        Slug of the establishment, the label of its subdomain
        (`{slug}.surplasse.com`). Lowercase letters, digits and hyphens.
      schema:
        type: string
        pattern: "^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$"
      example: le-cormoran

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: >
        Client-generated UUID identifying this intention. Replaying the same
        request with the same key returns the original response without any
        duplicate; the same key with a different payload yields a 409
        `idempotency-key-conflict`.
      schema:
        type: string
        format: uuid
      example: 7f3a9c1e-4b2d-4e8a-9c5f-1d2e3f4a5b6c

    OrderId:
      name: orderId
      in: path
      required: true
      description: Identifier of the order.
      schema:
        type: string
        format: uuid
      example: 0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b

    TrackingToken:
      name: trackingToken
      in: query
      required: true
      description: >
        Non-guessable tracking capability of the order, returned at
        creation. Carried by the tracking page URL so the customer can
        close the browser and come back.
      schema:
        type: string
        pattern: "^ot_[a-f0-9]{32}$"
      example: ot_5c3e1a9f7d2b4c8a6e0f2a4c6e8b0d1f

    StripeSignature:
      name: Stripe-Signature
      in: header
      required: true
      description: Stripe webhook signature, verified with the webhook secret before any processing.
      schema:
        type: string
      example: t=1721300000,v1=5257a869e7ecebeda32affa62cdca3fa51cad7e77a0e56ff536d0ce8e108d8bd

  examples:
    OrderExample:
      summary: An on-site order right after its creation
      value:
        id: 0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b
        displayNumber: "17"
        status: pending_payment
        type: on_site
        tableLabel: Table 4
        lines:
          - productId: d0e1f2a3-b4c5-46d7-88e9-f0a1b2c3d405
            productName: Burger du Vieux-Port
            unitPriceCents: 1600
            quantity: 1
            options:
              - group: Cuisson
                option: Saignant
                extraCostCents: 0
            note: Sauce à part.
            lineTotalCents: 1600
          - productId: d0e1f2a3-b4c5-46d7-88e9-f0a1b2c3d401
            productName: Panisses croustillantes
            unitPriceCents: 650
            quantity: 1
            options: []
            lineTotalCents: 650
        totalCents: 2250
        currency: EUR
        trackingToken: ot_5c3e1a9f7d2b4c8a6e0f2a4c6e8b0d1f
        createdAt: "2026-07-18T12:34:56Z"

  schemas:
    Problem:
      type: object
      description: >
        RFC 9457 Problem Details document, the single error format of the
        API. The `type` URI is stable and identifies the applicative error.
      properties:
        type:
          type: string
          description: Stable URI identifying the applicative error type.
          default: about:blank
        title:
          type: string
          description: Short, human-readable summary of the error type.
        status:
          type: integer
          description: HTTP status code of this occurrence.
          minimum: 100
          maximum: 599
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
        instance:
          type: string
          description: URI reference of the request that produced the error.
      required: [title, status]
      example:
        type: https://surplasse.com/problems/resource-not-found
        title: Resource not found
        status: 404
        detail: No establishment matches slug 'le-cormoran'.
        instance: /v1/establishments/le-cormoran/menu

    MagicLinkRequest:
      type: object
      additionalProperties: false
      description: The restaurateur email that should receive a login link.
      properties:
        email:
          type: string
          format: email
          minLength: 3
          maxLength: 320
          description: Email normalized case-insensitively by the server.
      required: [email]
      example:
        email: pilote@le-cormoran.example

    MagicLinkExchange:
      type: object
      additionalProperties: false
      description: The opaque single-use token carried by the magic link.
      properties:
        token:
          type: string
          minLength: 43
          maxLength: 128
          pattern: "^[A-Za-z0-9_-]+$"
          description: Opaque URL-safe token posted by the intermediate landing page.
      required: [token]
      example:
        token: ml_9f2c4b7a1e6d8a3c5f0b2d4e6a8c1f3b7d9e1a3c5f7b9d1e

    RestaurateurSession:
      type: object
      additionalProperties: false
      description: >
        Minimal authenticated restaurateur view used to initialize the
        Dashboard. It contains no authorization token because credentials stay
        exclusively in HttpOnly cookies.
      properties:
        id:
          type: string
          format: uuid
          description: Identifier of the authenticated restaurateur.
        email:
          type: string
          format: email
          description: Restaurateur email used for magic-link authentication.
        fullName:
          type: string
          minLength: 1
          maxLength: 200
          description: Name displayed in the Dashboard.
        establishments:
          type: array
          description: Establishments this restaurateur can access, sorted by name then identifier.
          items:
            $ref: "#/components/schemas/RestaurateurEstablishment"
      required: [id, email, fullName, establishments]
      example:
        id: a1b2c3d4-e5f6-4789-8abc-def012345678
        email: pilote@le-cormoran.example
        fullName: Camille Martin
        establishments:
          - id: 7c9e6679-7425-40de-944b-e07fc1f90ae7
            name: Le Cormoran
            slug: le-cormoran

    RestaurateurEstablishment:
      type: object
      additionalProperties: false
      description: An establishment accessible to the authenticated restaurateur.
      properties:
        id:
          type: string
          format: uuid
          description: Identifier used by authenticated Dashboard operations.
        name:
          type: string
          minLength: 1
          description: Display name of the establishment.
        slug:
          type: string
          pattern: "^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$"
          description: Subdomain label of the establishment mini-site.
      required: [id, name, slug]
      example:
        id: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        name: Le Cormoran
        slug: le-cormoran

    EstablishmentPublic:
      type: object
      description: Public profile of an establishment, rendered on its mini-site.
      properties:
        id:
          type: string
          format: uuid
          description: Identifier of the establishment.
        name:
          type: string
          description: Display name of the establishment.
        slug:
          type: string
          description: Slug of the establishment, label of its subdomain.
        address:
          type: string
          description: Postal address, displayed on the mini-site. Absent when not provided.
        acceptingOrders:
          type: boolean
          description: Whether new table sessions, orders and payment sessions are currently accepted.
      required: [id, name, slug, acceptingOrders]
      example:
        id: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        name: Le Cormoran
        slug: le-cormoran
        address: 12 quai des Belges, 13001 Marseille
        acceptingOrders: true

    OrderIntakeStatus:
      type: string
      description: Operational availability of new table sessions, orders and payment sessions.
      enum: [open, paused]
      example: open

    OrderIntakeBlockedReason:
      type: string
      description: Reason why new orders are not effectively accepted. Absent while accepting orders.
      enum: [paused, establishment_not_active, configuration_unavailable, payments_unavailable]
      example: paused

    OrderIntakeState:
      type: object
      additionalProperties: false
      description: Current operational order-intake state of an establishment.
      properties:
        establishmentId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/OrderIntakeStatus"
        acceptingOrders:
          type: boolean
          description: Effective availability after lifecycle and Stripe readiness are applied.
        blockedReason:
          $ref: "#/components/schemas/OrderIntakeBlockedReason"
        updatedAt:
          type: string
          format: date-time
          description: >
            Instant when the configured status last changed, including an
            automatic pause caused by Stripe. Readiness changes that only
            affect acceptingOrders do not move it. Repeated idempotent updates
            keep it unchanged.
      required: [establishmentId, status, acceptingOrders, updatedAt]
      example:
        establishmentId: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        status: open
        acceptingOrders: true
        updatedAt: "2026-07-20T10:00:00Z"

    OrderIntakeUpdate:
      type: object
      additionalProperties: false
      description: Desired operational state of new orders for one establishment.
      properties:
        status:
          $ref: "#/components/schemas/OrderIntakeStatus"
      required: [status]
      example:
        status: paused

    PublicMenu:
      type: object
      description: >
        The published menu of an establishment, as a complete read model in
        display order. Array order is the display order.
      properties:
        id:
          type: string
          format: uuid
          description: Identifier of the menu.
        name:
          type: string
          description: Name of the menu, chosen by the restaurateur.
        currency:
          type: string
          description: ISO 4217 currency code of every amount in the menu.
        categories:
          type: array
          description: Categories of the menu, in display order.
          items:
            $ref: "#/components/schemas/MenuCategory"
      required: [id, name, currency, categories]
      example:
        id: 9b2f5c1a-6d3e-4b7f-8a2c-1e9d8c7b6a5f
        name: Carte principale
        currency: EUR
        categories:
          - id: c1a2b3c4-d5e6-47f8-89ab-cdef01234501
            name: Entrées
            products:
              - id: d0e1f2a3-b4c5-46d7-88e9-f0a1b2c3d401
                name: Panisses croustillantes
                description: Frites de pois chiches, aïoli maison.
                priceCents: 650
                available: true
                optionGroups: []

    MenuCategory:
      type: object
      description: A section of the menu (starters, mains, drinks).
      properties:
        id:
          type: string
          format: uuid
          description: Identifier of the category.
        name:
          type: string
          description: Display name of the category.
        products:
          type: array
          description: Products of the category, in display order.
          items:
            $ref: "#/components/schemas/MenuProduct"
      required: [id, name, products]
      example:
        id: c1a2b3c4-d5e6-47f8-89ab-cdef01234501
        name: Entrées
        products:
          - id: d0e1f2a3-b4c5-46d7-88e9-f0a1b2c3d401
            name: Panisses croustillantes
            description: Frites de pois chiches, aïoli maison.
            priceCents: 650
            available: true
            optionGroups: []

    MenuProduct:
      type: object
      description: >
        A product as displayed on the menu. Unavailable products are included
        with `available: false` so the frontend renders them greyed out.
      properties:
        id:
          type: string
          format: uuid
          description: Identifier of the product.
        name:
          type: string
          description: Display name of the product.
        description:
          type: string
          description: Short description of the product. Absent when not provided.
        priceCents:
          type: integer
          description: Base price of the product, in cents.
          minimum: 0
        available:
          type: boolean
          description: Whether the product can currently be ordered.
        optionGroups:
          type: array
          description: Option groups of the product, in display order. Empty when the product has no options.
          items:
            $ref: "#/components/schemas/MenuOptionGroup"
      required: [id, name, priceCents, available, optionGroups]
      example:
        id: d0e1f2a3-b4c5-46d7-88e9-f0a1b2c3d405
        name: Burger du Vieux-Port
        description: Pain artisanal, bœuf de Provence, tomme de brebis.
        priceCents: 1600
        available: true
        optionGroups: []

    MenuOptionGroup:
      type: object
      description: >
        A set of options of a product (doneness, size, extras) with its
        choice rules. `minChoices` of 1 or more makes the group mandatory.
      properties:
        id:
          type: string
          format: uuid
          description: Identifier of the option group.
        name:
          type: string
          description: Display name of the group.
        minChoices:
          type: integer
          description: Minimum number of options to pick in the group.
          minimum: 0
        maxChoices:
          type: integer
          description: Maximum number of options to pick in the group. Always greater than or equal to `minChoices`.
          minimum: 1
        options:
          type: array
          description: Options of the group, in display order.
          items:
            $ref: "#/components/schemas/MenuOption"
      required: [id, name, minChoices, maxChoices, options]
      example:
        id: e1f2a3b4-c5d6-47e8-89f0-a1b2c3d4e502
        name: Cuisson
        minChoices: 1
        maxChoices: 1
        options:
          - id: f0a1b2c3-d4e5-46f7-88a9-b0c1d2e3f404
            name: Saignant
            extraCostCents: 0
            available: true

    MenuOption:
      type: object
      description: A variant or extra inside an option group.
      properties:
        id:
          type: string
          format: uuid
          description: Identifier of the option.
        name:
          type: string
          description: Display name of the option.
        extraCostCents:
          type: integer
          description: Extra cost of the option, in cents. Zero for free variants.
          minimum: 0
        available:
          type: boolean
          description: Whether the option can currently be picked.
      required: [id, name, extraCostCents, available]
      example:
        id: f0a1b2c3-d4e5-46f7-88a9-b0c1d2e3f404
        name: Saignant
        extraCostCents: 0
        available: true

    TableSessionRequest:
      type: object
      description: The context carried by a scanned table QR code.
      properties:
        establishmentSlug:
          type: string
          description: Slug of the establishment, from the mini-site subdomain.
          pattern: "^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$"
        tableCode:
          type: string
          description: Non-guessable table code carried by the QR URL, never a sequential number.
          minLength: 1
      required: [establishmentSlug, tableCode]
      example:
        establishmentSlug: le-cormoran
        tableCode: tbl_2f8e6a4c0b9d7e1f

    TableSession:
      type: object
      description: >
        An anonymous table session. The token is opaque (a server-side
        reference, not a JWT) and carries no personal data.
      properties:
        token:
          type: string
          description: Opaque session token, sent back in the X-Table-Session header.
        establishmentId:
          type: string
          format: uuid
          description: Establishment the session is bound to.
        tableLabel:
          type: string
          description: Human label of the table, resolved server side from the scanned code.
        expiresAt:
          type: string
          format: date-time
          description: Expiry of the session, sliding while the session is active.
      required: [token, establishmentId, tableLabel, expiresAt]
      example:
        token: ts_9f2c4b7a1e6d8a3c5f0b2d4e6a8c1f3b
        establishmentId: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        tableLabel: Table 4
        expiresAt: "2026-07-18T14:30:00Z"

    OrderCreationRequest:
      type: object
      description: >
        The validated cart sent by the Commande frontend. The establishment
        and the table come from the table session; amounts are recomputed
        server side from the catalog and never trusted from the client.
      properties:
        type:
          type: string
          description: Type of the order. Only `on_site` is accepted at this stage.
          enum: [on_site, takeaway]
        lines:
          type: array
          description: Lines of the cart, one per product and option combination.
          minItems: 1
          items:
            $ref: "#/components/schemas/OrderLineRequest"
      required: [type, lines]
      example:
        type: on_site
        lines:
          - productId: d0e1f2a3-b4c5-46d7-88e9-f0a1b2c3d405
            quantity: 1
            optionIds:
              - f0a1b2c3-d4e5-46f7-88a9-b0c1d2e3f404
            note: Sauce à part.

    OrderLineRequest:
      type: object
      description: One line of the validated cart.
      properties:
        productId:
          type: string
          format: uuid
          description: Product being ordered.
        quantity:
          type: integer
          description: Quantity ordered.
          minimum: 1
          maximum: 50
        optionIds:
          type: array
          description: Options picked for this line, one entry per picked option, all groups rules enforced server side.
          items:
            type: string
            format: uuid
        note:
          type: string
          description: Free note for the kitchen, passed along verbatim.
          maxLength: 200
      required: [productId, quantity]
      example:
        productId: d0e1f2a3-b4c5-46d7-88e9-f0a1b2c3d405
        quantity: 1
        optionIds:
          - f0a1b2c3-d4e5-46f7-88a9-b0c1d2e3f404
        note: Sauce à part.

    Order:
      type: object
      description: >
        An order as seen by the customer: lines frozen at creation (names,
        prices and options copied from the catalog at that instant), status
        driven by the kitchen.
      properties:
        id:
          type: string
          format: uuid
          description: Identifier of the order.
        displayNumber:
          type: string
          description: Short number displayed to the customer and the staff, unique per establishment and day.
        status:
          type: string
          description: Current status of the order.
          enum:
            - pending_payment
            - paid
            - accepted
            - preparing
            - ready
            - served
            - picked_up
            - cancelled
            - refunded
        type:
          type: string
          description: Type of the order.
          enum: [on_site, takeaway]
        tableLabel:
          type: string
          description: Label of the table for on-site orders. Absent for takeaway.
        lines:
          type: array
          description: Lines of the order, frozen at creation.
          items:
            $ref: "#/components/schemas/OrderLine"
        totalCents:
          type: integer
          description: Total of the order in cents, sum of the line totals.
          minimum: 0
        currency:
          type: string
          description: ISO 4217 currency code.
        trackingToken:
          type: string
          description: Non-guessable capability giving access to the tracking page and stream.
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp, ISO 8601 UTC.
      required: [id, displayNumber, status, type, lines, totalCents, currency, trackingToken, createdAt]
      example:
        id: 0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b
        displayNumber: "17"
        status: pending_payment
        type: on_site
        tableLabel: Table 4
        lines:
          - productId: d0e1f2a3-b4c5-46d7-88e9-f0a1b2c3d405
            productName: Burger du Vieux-Port
            unitPriceCents: 1600
            quantity: 1
            options:
              - group: Cuisson
                option: Saignant
                extraCostCents: 0
            note: Sauce à part.
            lineTotalCents: 1600
        totalCents: 1600
        currency: EUR
        trackingToken: ot_5c3e1a9f7d2b4c8a6e0f2a4c6e8b0d1f
        createdAt: "2026-07-18T12:34:56Z"

    DashboardOrder:
      type: object
      description: >
        An operational order displayed to the establishment staff. The
        customer tracking capability is deliberately omitted.
      properties:
        id:
          type: string
          format: uuid
          description: Identifier of the order.
        displayNumber:
          type: string
          description: Short number displayed to the customer and staff.
        status:
          type: string
          description: Current operational status of the order.
          enum: [paid, accepted, preparing, ready]
        type:
          type: string
          description: Type of the order.
          enum: [on_site, takeaway]
        tableLabel:
          type: string
          description: Label of the table. Absent for takeaway.
        lines:
          type: array
          description: Lines frozen when the order was created.
          items:
            $ref: "#/components/schemas/OrderLine"
        totalCents:
          type: integer
          minimum: 0
          description: Total amount in cents.
        currency:
          type: string
          description: ISO 4217 currency code.
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp in UTC.
      required: [id, displayNumber, status, type, lines, totalCents, currency, createdAt]
      example:
        id: 0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b
        displayNumber: "17"
        status: paid
        type: on_site
        tableLabel: Table 4
        lines:
          - productId: d0e1f2a3-b4c5-46d7-88e9-f0a1b2c3d405
            productName: Burger du Vieux-Port
            unitPriceCents: 1600
            quantity: 1
            options: []
            lineTotalCents: 1600
        totalCents: 1600
        currency: EUR
        createdAt: "2026-07-18T12:34:56Z"

    OrderStatusUpdate:
      type: object
      description: The next operational status requested by establishment staff.
      properties:
        status:
          type: string
          description: The next status in the order state machine.
          enum: [accepted, preparing, ready, served, picked_up]
      required: [status]
      example:
        status: accepted

    OrderStatusResult:
      type: object
      description: The order identifier and its status after an idempotent operational update.
      properties:
        id:
          type: string
          format: uuid
          description: Identifier of the updated order.
        status:
          type: string
          description: Status reached by the order.
          enum: [accepted, preparing, ready, served, picked_up]
      required: [id, status]
      example:
        id: 0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b
        status: accepted

    OrderPage:
      type: object
      description: >
        One cursor-paginated page of operational orders, newest first.
        nextCursor is present exactly when hasMore is true.
      properties:
        items:
          type: array
          description: Operational orders in this page.
          items:
            $ref: "#/components/schemas/DashboardOrder"
        nextCursor:
          type: string
          minLength: 1
          maxLength: 512
          description: Opaque cursor to request the following page.
        hasMore:
          type: boolean
          description: Whether another page exists.
      required: [items, hasMore]
      example:
        items:
          - id: 0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b
            displayNumber: "17"
            status: paid
            type: on_site
            tableLabel: Table 4
            lines: []
            totalCents: 1600
            currency: EUR
            createdAt: "2026-07-18T12:34:56Z"
        nextCursor: djF8MjAyNi0wNy0xOFQxMjozNDo1NlowZDllOGM3Yg
        hasMore: true

    OrderLine:
      type: object
      description: A line of an order, snapshot of the product and options at creation time.
      properties:
        productId:
          type: string
          format: uuid
          description: Product reference; may point to a product later removed from the menu.
        productName:
          type: string
          description: Name of the product, frozen at creation.
        unitPriceCents:
          type: integer
          description: Unit price in cents, frozen at creation.
          minimum: 0
        quantity:
          type: integer
          description: Quantity ordered.
          minimum: 1
        options:
          type: array
          description: Options picked for this line, snapshot with their labels and extra costs.
          items:
            $ref: "#/components/schemas/OrderLineOption"
        note:
          type: string
          description: Free note for the kitchen. Absent when not provided.
        lineTotalCents:
          type: integer
          description: (unit price + extra costs) x quantity, in cents.
          minimum: 0
      required: [productId, productName, unitPriceCents, quantity, options, lineTotalCents]
      example:
        productId: d0e1f2a3-b4c5-46d7-88e9-f0a1b2c3d405
        productName: Burger du Vieux-Port
        unitPriceCents: 1600
        quantity: 1
        options:
          - group: Cuisson
            option: Saignant
            extraCostCents: 0
        note: Sauce à part.
        lineTotalCents: 1600

    OrderLineOption:
      type: object
      description: An option picked on a line, snapshot at creation time.
      properties:
        group:
          type: string
          description: Name of the option group, frozen at creation.
        option:
          type: string
          description: Name of the option, frozen at creation.
        extraCostCents:
          type: integer
          description: Extra cost of the option in cents, frozen at creation.
          minimum: 0
      required: [group, option, extraCostCents]
      example:
        group: Cuisson
        option: Saignant
        extraCostCents: 0

    PaymentCreationRequest:
      type: object
      description: The order to open a Stripe payment session for.
      properties:
        orderId:
          type: string
          format: uuid
          description: Order to pay, at status pending_payment, inside the caller's table session.
      required: [orderId]
      example:
        orderId: 0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b

    PaymentSession:
      type: object
      description: >
        A Stripe payment session for one order. The client secret feeds the
        Payment Element; the amount is recomputed server side.
      properties:
        id:
          type: string
          format: uuid
          description: Identifier of the payment attempt.
        orderId:
          type: string
          format: uuid
          description: Order being paid.
        amountCents:
          type: integer
          description: Amount to pay in cents, recomputed server side.
          minimum: 1
        currency:
          type: string
          description: ISO 4217 currency code.
        clientSecret:
          type: string
          description: Stripe PaymentIntent client secret, consumed by the Payment Element.
        connectedAccountId:
          type: string
          description: Stripe Connect account used by both the PaymentIntent and Stripe.js.
      required: [id, orderId, amountCents, currency, clientSecret, connectedAccountId]
      example:
        id: b3a2c1d0-e9f8-4a7b-8c6d-5e4f3a2b1c0d
        orderId: 0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b
        amountCents: 2250
        currency: EUR
        clientSecret: pi_3Nxxxxxxxxxxxx_secret_xxxxxxxxxxxxx
        connectedAccountId: acct_1Nxxxxxxxxxxxxxxxx

    RefundCreationRequest:
      type: object
      description: The paid order and operational reason for its full refund.
      properties:
        orderId:
          type: string
          format: uuid
          description: Paid order owned by the authenticated establishment.
        reason:
          type: string
          description: Operational reason recorded by Surplasse and sent to Stripe metadata.
          enum: [restaurant_refusal, item_unavailable, service_incident]
      required: [orderId, reason]
      example:
        orderId: 0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b
        reason: restaurant_refusal

    Refund:
      type: object
      description: A full refund attempt and its latest Stripe status.
      properties:
        id:
          type: string
          format: uuid
          description: Surplasse refund identifier.
        orderId:
          type: string
          format: uuid
          description: Refunded order.
        amountCents:
          type: integer
          minimum: 1
          description: Full customer amount refunded in cents.
        applicationFeeRefundedCents:
          type: integer
          minimum: 0
          description: Surplasse application fee returned to the restaurant in cents.
        currency:
          type: string
          description: ISO 4217 currency code.
        reason:
          type: string
          enum: [restaurant_refusal, item_unavailable, service_incident]
          description: Operational reason selected by establishment staff.
        status:
          type: string
          enum: [pending, requires_action, succeeded, failed, canceled]
          description: Latest authoritative Stripe refund status.
      required: [id, orderId, amountCents, applicationFeeRefundedCents, currency, reason, status]
      example:
        id: a4b3c2d1-e0f9-4876-95a4-b3c2d1e0f987
        orderId: 0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b
        amountCents: 2250
        applicationFeeRefundedCents: 22
        currency: EUR
        reason: restaurant_refusal
        status: succeeded

    StripeEvent:
      type: object
      description: >
        Opaque Stripe event payload. Authenticity comes from the signature
        header, not from the body: the backend only trusts it once the
        signature is verified, and only reads the fields it needs.
      additionalProperties: true
      example:
        id: evt_1Nxxxxxxxxxxxxxxxxxxxxxx
        type: payment_intent.succeeded
        account: acct_1Nxxxxxxxxxxxxxxxx
        livemode: false

    StripeThinEvent:
      type: object
      description: >
        Unversioned Stripe thin event for an Accounts v2 change. The backend
        verifies the raw payload signature, validates the related account and
        fetches its current versioned state instead of treating this body as a
        resource snapshot.
      additionalProperties: true
      example:
        id: evt_test_65xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
        object: v2.core.event
        type: v2.core.account[configuration.merchant].capability_status_updated
        created: 2026-07-20T10:00:00Z
        livemode: false
        related_object:
          id: acct_1Nxxxxxxxxxxxxxxxx
          type: v2.core.account
          url: /v2/core/accounts/acct_1Nxxxxxxxxxxxxxxxx?include=configuration.merchant

    WebhookAck:
      type: object
      description: Acknowledgement of a webhook event.
      properties:
        received:
          type: boolean
          description: Always true when the event is acknowledged.
      required: [received]
      example:
        received: true

    EventStream:
      type: string
      description: >
        A Server-Sent Events stream body. Each event carries a monotonic
        id (replayed via Last-Event-ID on reconnection), an event name and
        a JSON data payload.
      example: |
        id: 42
        event: order-status
        data: {"orderId":"0d9e8c7b-6a5f-4e3d-8c2b-1a0f9e8d7c6b","status":"accepted"}
