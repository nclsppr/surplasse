# Configuration of the assembled backend, by profile
# (docs/architecture/backend.md, section "Configuration par profils").
# %prod values come from environment variables injected by Docker Compose;
# no secret ever lives in this file.

quarkus.http.port=8080
quarkus.datasource.db-kind=postgresql
quarkus.http.auth.proactive=false

# Entity fields are camelCase, columns are snake_case (docs/architecture/donnees.md).
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Flyway owns the schema. The demo seed (db/seed) is a dev and test
# location only: production never loads it.
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
%dev.quarkus.flyway.locations=classpath:db/migration,classpath:db/seed
%test.quarkus.flyway.locations=classpath:db/migration,classpath:db/seed

# Dev Services: PostgreSQL 17 on the conventional port 5432
# (docs/developpement/index.md, section "Ports conventionnels").
%dev.quarkus.datasource.devservices.image-name=postgres:17
%dev.quarkus.datasource.devservices.port=5432
%test.quarkus.datasource.devservices.image-name=postgres:17

# The Vite dev servers call the API from their own origins, reachable as
# localhost or 127.0.0.1 depending on the browser.
%dev.quarkus.http.cors.enabled=true
%dev.quarkus.http.cors.origins=http://localhost:5173,http://localhost:5174,http://localhost:5175,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175
%dev.quarkus.http.cors.access-control-allow-credentials=true
%prod.quarkus.http.cors.enabled=true
%prod.quarkus.http.cors.origins=https://surplasse.com,https://dashboard.surplasse.com,/https:\/\/[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?\.surplasse\.com/
%prod.quarkus.http.cors.access-control-allow-credentials=true

# Passwordless restaurateur identity. Quarkus generates an ephemeral key pair
# in dev and test. Production mounts the private signing key and a public JWK
# set containing the current and previous keys, both outside the image.
surplasse.identity.magic-link-landing-url=${AUTH_MAGIC_LINK_LANDING_URL:http://localhost:5174/auth/magic-link}
surplasse.identity.secure-cookies=${AUTH_SECURE_COOKIES:false}
%prod.surplasse.identity.secure-cookies=${AUTH_SECURE_COOKIES:true}
surplasse.identity.jwt-issuer=${AUTH_JWT_ISSUER:https://api.surplasse.com}
surplasse.identity.jwt-audience=${AUTH_JWT_AUDIENCE:surplasse-dashboard}
mp.jwt.verify.issuer=${surplasse.identity.jwt-issuer}
mp.jwt.verify.audiences=${surplasse.identity.jwt-audience}
mp.jwt.token.header=Cookie
mp.jwt.token.cookie=surplasse_session
smallrye.jwt.always-check-authorization=false
%prod.smallrye.jwt.sign.key.location=${AUTH_JWT_PRIVATE_KEY_PATH}
%prod.smallrye.jwt.sign.key.id=${AUTH_JWT_KEY_ID}
%prod.mp.jwt.verify.publickey.location=${AUTH_JWT_JWKS_PATH}

# Mailpit is the real SMTP sink in dev only. Tests use Quarkus MockMailbox;
# production uses the transactional SMTP account selected by operations.
quarkus.mailer.from=${SMTP_FROM:no-reply@surplasse.local}
quarkus.log.category."quarkus-mailer".level=WARN
%dev.quarkus.mailer.mock=false
%dev.quarkus.mailer.host=localhost
%dev.quarkus.mailer.port=1025
%dev.quarkus.mailer.tls=false
%dev.quarkus.mailer.start-tls=DISABLED
%dev.quarkus.mailer.login=DISABLED
%test.quarkus.mailer.mock=true
%prod.quarkus.mailer.mock=false
%prod.quarkus.mailer.host=${SMTP_HOST}
%prod.quarkus.mailer.port=${SMTP_PORT:587}
%prod.quarkus.mailer.username=${SMTP_USERNAME}
%prod.quarkus.mailer.password=${SMTP_PASSWORD}
%prod.quarkus.mailer.from=${SMTP_FROM}
%prod.quarkus.mailer.tls=${SMTP_TLS:false}
%prod.quarkus.mailer.start-tls=${SMTP_START_TLS:REQUIRED}
%prod.quarkus.mailer.login=REQUIRED

# Stripe (test mode outside production). Blank means not configured: the
# payment endpoints answer 503 with a clear detail, everything else runs.
surplasse.payment.stripe-secret-key=${STRIPE_SECRET_KEY:}
surplasse.payment.stripe-webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# The API documentation served at /q/swagger-ui (dev only by default) is
# the contract itself, copied by npm run api:generate into
# META-INF/openapi.yaml. No annotation scanning: the contract is the single
# source of truth, code never generates API documentation.
mp.openapi.scan.disable=true
