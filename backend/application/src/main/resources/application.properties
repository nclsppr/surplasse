# Configuration of the assembled backend, by profile
# (docs/architecture/backend.md, section "Configuration par profils").
# %prod values come from environment variables injected by Docker Compose;
# no secret ever lives in this file.

quarkus.http.port=8080
quarkus.datasource.db-kind=postgresql

# Entity fields are camelCase, columns are snake_case (docs/architecture/donnees.md).
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Flyway owns the schema. The demo seed (db/seed) is a dev and test
# location only: production never loads it.
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
%dev.quarkus.flyway.locations=classpath:db/migration,classpath:db/seed
%test.quarkus.flyway.locations=classpath:db/migration,classpath:db/seed

# Dev Services: PostgreSQL 17 on the conventional port 5432
# (docs/developpement/index.md, section "Ports conventionnels").
%dev.quarkus.datasource.devservices.image-name=postgres:17
%dev.quarkus.datasource.devservices.port=5432
%test.quarkus.datasource.devservices.image-name=postgres:17

# The Vite dev servers call the API from their own origins, reachable as
# localhost or 127.0.0.1 depending on the browser.
%dev.quarkus.http.cors.enabled=true
%dev.quarkus.http.cors.origins=http://localhost:5173,http://localhost:5174,http://localhost:5175,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175

# Stripe (test mode outside production). Blank means not configured: the
# payment endpoints answer 503 with a clear detail, everything else runs.
surplasse.payment.stripe-secret-key=${STRIPE_SECRET_KEY:}
surplasse.payment.stripe-webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# The API documentation served at /q/swagger-ui (dev only by default) is
# the contract itself, copied by npm run api:generate into
# META-INF/openapi.yaml. No annotation scanning: the contract is the single
# source of truth, code never generates API documentation.
mp.openapi.scan.disable=true
