# Test profile of the catalog module: PostgreSQL 17 via Dev Services
# (Testcontainers), schema and demo seed applied by Flyway.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.image-name=postgres:17
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration,classpath:db/seed
