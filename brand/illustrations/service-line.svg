<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-labelledby="title description" shape-rendering="crispEdges">
  <title id="title">La ligne de service Surplasse</title>
  <desc id="description">Une carte photographiée devient une carte numérique, un QR code à table puis un ticket en cuisine.</desc>
  <style>
    .signal { fill: #fa550c; }
    .paper { fill: #f4f4f0; }
    .ink { fill: #181818; }
    .quiet { fill: #787873; }
    .success { fill: #47a77d; }
    .outline { fill: none; stroke: #f4f4f0; stroke-width: 8; }
    .signal-outline { fill: none; stroke: #fa550c; stroke-width: 8; }
    .pulse { opacity: .32; }
    @media (prefers-reduced-motion: no-preference) {
      .pulse { animation: service-pulse 3.2s steps(1, end) infinite; }
      .pulse-2 { animation-delay: .4s; }
      .pulse-3 { animation-delay: .8s; }
      .pulse-4 { animation-delay: 1.2s; }
      .pulse-5 { animation-delay: 1.6s; }
      .pulse-6 { animation-delay: 2s; }
      .pulse-7 { animation-delay: 2.4s; }
      .pulse-8 { animation-delay: 2.8s; }
    }
    @keyframes service-pulse {
      0%, 24% { opacity: 1; }
      25%, 100% { opacity: .32; }
    }
  </style>

  <rect width="960" height="640" class="ink"/>

  <!-- Menu photograph -->
  <g aria-hidden="true">
    <rect x="56" y="152" width="168" height="248" class="paper"/>
    <rect x="56" y="152" width="168" height="24" class="signal"/>
    <rect x="80" y="204" width="72" height="12" class="ink"/>
    <rect x="80" y="240" width="112" height="8" class="quiet"/>
    <rect x="80" y="268" width="96" height="8" class="quiet"/>
    <rect x="80" y="296" width="120" height="8" class="quiet"/>
    <rect x="80" y="324" width="88" height="8" class="quiet"/>
    <rect x="80" y="352" width="104" height="8" class="quiet"/>
    <rect x="40" y="136" width="32" height="8" class="signal"/>
    <rect x="40" y="136" width="8" height="32" class="signal"/>
    <rect x="208" y="136" width="32" height="8" class="signal"/>
    <rect x="232" y="136" width="8" height="32" class="signal"/>
    <rect x="40" y="408" width="32" height="8" class="signal"/>
    <rect x="40" y="384" width="8" height="32" class="signal"/>
    <rect x="208" y="408" width="32" height="8" class="signal"/>
    <rect x="232" y="384" width="8" height="32" class="signal"/>
  </g>

  <!-- Structured menu -->
  <g aria-hidden="true">
    <rect x="312" y="128" width="184" height="296" class="outline"/>
    <rect x="336" y="160" width="88" height="16" class="signal"/>
    <rect x="336" y="208" width="136" height="12" class="paper"/>
    <rect x="336" y="232" width="88" height="8" class="quiet"/>
    <rect x="448" y="232" width="24" height="8" class="paper"/>
    <rect x="336" y="272" width="120" height="12" class="paper"/>
    <rect x="336" y="296" width="80" height="8" class="quiet"/>
    <rect x="448" y="296" width="24" height="8" class="paper"/>
    <rect x="336" y="336" width="112" height="12" class="paper"/>
    <rect x="336" y="360" width="96" height="8" class="quiet"/>
    <rect x="448" y="360" width="24" height="8" class="paper"/>
    <rect x="336" y="392" width="136" height="8" class="signal"/>
  </g>

  <!-- QR at table -->
  <g aria-hidden="true">
    <rect x="584" y="168" width="152" height="224" class="paper"/>
    <rect x="608" y="192" width="104" height="104" class="ink"/>
    <rect x="616" y="200" width="32" height="32" class="paper"/>
    <rect x="624" y="208" width="16" height="16" class="ink"/>
    <rect x="672" y="200" width="32" height="32" class="paper"/>
    <rect x="680" y="208" width="16" height="16" class="ink"/>
    <rect x="616" y="256" width="32" height="32" class="paper"/>
    <rect x="624" y="264" width="16" height="16" class="ink"/>
    <rect x="656" y="240" width="16" height="16" class="paper"/>
    <rect x="680" y="248" width="8" height="24" class="paper"/>
    <rect x="656" y="272" width="24" height="8" class="paper"/>
    <rect x="616" y="320" width="88" height="12" class="signal"/>
    <rect x="632" y="352" width="56" height="8" class="ink"/>
    <rect x="568" y="424" width="184" height="16" class="paper"/>
    <rect x="592" y="440" width="136" height="16" class="paper"/>
  </g>

  <!-- Kitchen ticket -->
  <g aria-hidden="true">
    <rect x="792" y="136" width="120" height="280" class="paper"/>
    <rect x="808" y="160" width="56" height="12" class="ink"/>
    <rect x="880" y="160" width="16" height="12" class="signal"/>
    <rect x="808" y="200" width="88" height="8" class="ink"/>
    <rect x="808" y="224" width="72" height="8" class="quiet"/>
    <rect x="808" y="248" width="80" height="8" class="quiet"/>
    <rect x="808" y="288" width="88" height="8" class="ink"/>
    <rect x="808" y="312" width="64" height="8" class="quiet"/>
    <rect x="808" y="352" width="64" height="16" class="signal"/>
    <rect x="880" y="352" width="16" height="16" class="success"/>
  </g>

  <!-- Routed data, deliberately stepped like a short physical circuit -->
  <g aria-hidden="true">
    <rect x="248" y="272" width="16" height="16" class="signal pulse pulse-1"/>
    <rect x="272" y="272" width="16" height="16" class="signal pulse pulse-2"/>
    <rect x="288" y="256" width="16" height="16" class="signal pulse pulse-3"/>

    <rect x="520" y="272" width="16" height="16" class="signal pulse pulse-3"/>
    <rect x="544" y="272" width="16" height="16" class="signal pulse pulse-4"/>
    <rect x="560" y="256" width="16" height="16" class="signal pulse pulse-5"/>

    <rect x="752" y="272" width="16" height="16" class="signal pulse pulse-5"/>
    <rect x="768" y="256" width="16" height="16" class="signal pulse pulse-6"/>

    <rect x="816" y="464" width="16" height="16" class="signal pulse pulse-7"/>
    <rect x="840" y="464" width="16" height="16" class="signal pulse pulse-8"/>
    <rect x="864" y="464" width="16" height="16" class="success"/>
  </g>

  <rect x="40" y="512" width="872" height="8" class="quiet"/>
  <rect x="40" y="512" width="824" height="8" class="signal"/>
</svg>
