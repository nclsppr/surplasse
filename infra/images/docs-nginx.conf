server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    add_header X-Content-Type-Options "nosniff" always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ready\n";
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
