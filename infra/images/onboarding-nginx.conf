server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    add_header Cache-Control "no-store" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://connect-js.stripe.com https://js.stripe.com; frame-src https://connect-js.stripe.com https://js.stripe.com; img-src 'self' blob: data: https://*.stripe.com; font-src 'self'; connect-src 'self' https://api.stripe.com; object-src 'none'; frame-ancestors 'none'; base-uri 'none'" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location = /__health {
        access_log off;
        default_type text/plain;
        return 200 "ready\n";
    }

    location / {
        try_files $uri =404;
    }
}
